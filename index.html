<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            Genshin, HSR and ZZZ pity calculator
        </title>
        <link rel="stylesheet" href="style.css">
        <style>

        </style>
    </head>
    <body>
        <div class="input-container">
            <p>
                Stored pulls: 
                <input class="js-pulls">
            </p>
            <p>
                Stored gems: 
                <input class="js-gems">
            </p>
            <p>
                Current pity: 
                <input class="js-pity">
            </p>
        </div>
        <div class="date-container">
            <p>
                Banner date: 
                <input class="js-date" type="date" id="start" name="trip-start" min="2020-09-28" max="2040-09-28" />
            </p>
        </div>
        <div class="button-container">
            <p>
                <button class = "js-normal" onclick="
                    calculate(false);
                    ">
                    Without welkin
                </button>
                <button class = "js-welkin" onclick="
                    calculate(true);
                ">
                With welkin
                </button>
            </p>
        </div>
        <div class="result-container">
            <p class="js-result"></p>
            <p class="js-5stars"></p>
        </div>
        <script src="pitycalculator.js">
        </script>
    </body>
</html>
